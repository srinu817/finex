{% extends 'dashboard/base.html' %}

{% block content %}

<style>

.page-header{
margin-bottom:25px;
}

.page-header h1{
font-size:28px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
max-width:500px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

form p{
display:flex;
flex-direction:column;
font-size:14px;
}

input, select{
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

.btn-primary{
background:#1abc9c;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
font-weight:500;
width:140px;
}

.btn-primary:hover{
background:#16a085;
}

</style>


<div class="page-header">
<h1>Add Loan</h1>
</div>

<div class="card">

<form method="POST">
{% csrf_token %}

{{ form.as_p }}

<button type="submit" class="btn-primary">
Add Loan
</button>

</form>

</div>

{% endblock %}
