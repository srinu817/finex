{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>FinFlow</title>

    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

   <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Arial, sans-serif;
}

body{
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:240px;
height:100vh;
background:#2f3e4e;
color:white;
position:fixed;
top:0;
left:0;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
letter-spacing:1px;
}

.sidebar a{
display:block;
padding:12px 25px;
color:#cfd8dc;
text-decoration:none;
font-size:15px;
transition:0.3s;
}

.sidebar a:hover{
background:#1abc9c;
color:white;
border-radius:4px;
}

/* Main content */

.content{
margin-left:240px;
min-height:100vh;
}

/* Topbar */

.topbar{
height:60px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.topbar a{
margin-left:15px;
text-decoration:none;
color:#333;
font-weight:500;
}

/* Container */

.container{
padding:30px;
}

/* Dashboard Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
font-size:16px;
color:#555;
}

.amount{
font-size:24px;
font-weight:bold;
margin-top:10px;
color:#2c3e50;
}

/* Tables */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

table th{
background:#f1f3f6;
padding:12px;
text-align:left;
font-size:14px;
}

table td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

table tr:hover{
background:#fafafa;
}

/* Forms */

input, select{
padding:8px;
border:1px solid #ddd;
border-radius:5px;
margin-right:10px;
}

button{
background:#1abc9c;
color:white;
border:none;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#16a085;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <h2>FINFLOW</h2>
    <a href="{% url 'dashboard' %}">Dashboard</a>
<a href="{% url 'income' %}">Income</a>
<a href="{% url 'expenses' %}">Expenses</a>
<a href="{% url 'loans' %}">Loans</a>
<a href="{% url 'reports' %}">Reports</a>

    <!-- <a href="/">Dashboard</a>
    <a href="/expenses/">Expenses</a>
    <a href="/income/">Income</a>
    <a href="/loans/">Loans</a>
    <a href="/reports/">Reports</a> -->
</div>

<!-- Main Content -->

<div class="content">

    <div class="topbar">

        <div>
            Welcome, {{ request.user.username }}
        </div>

        <div>
            <a href="/profile/">Profile</a>
            <a href="/logout/">Logout</a>
        </div>

    </div>

    <div class="container">

        {% block content %}

        {% endblock %}

    </div>

</div>

</body>
</html>
