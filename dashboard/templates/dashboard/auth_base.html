<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FinFlow</title>

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#2c3e50,#4ca1af);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .auth-container{
            background:white;
            padding:40px;
            border-radius:10px;
            width:350px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            background:#2c3e50;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#34495e;
        }

        .link{
            text-align:center;
            margin-top:10px;
        }

        a{
            text-decoration:none;
            color:#3498db;
        }

    </style>

</head>

<body>

<div class="auth-container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
