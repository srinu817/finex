{% extends 'dashboard/base.html' %}

{% block content %}

<style>

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.form-group{
margin-bottom:15px;
}

.form-group input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

.btn{
background:#2ecc71;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.btn-danger{
background:#e74c3c;
margin-top:10px;
}

</style>

<div class="container">

<div class="card">

<h2>Settings</h2>

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Change Password</label>
<input type="password" name="password" placeholder="New Password">
</div>

<button class="btn">Update Password</button>

</form>

<form method="POST" action="{% url 'delete_account' %}">
{% csrf_token %}
<button class="btn btn-danger">Delete Account</button>
</form>

</div>

</div>

{% endblock %}
